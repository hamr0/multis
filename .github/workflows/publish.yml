name: Publish to npm

# Trusted publishing via OIDC — no NPM_TOKEN needed.
# Configure the trusted publisher at npmjs.com first (see repo notes).
on:
  workflow_dispatch:        # manual "Run workflow" button
  release:
    types: [published]      # also publishes when you cut a GitHub release

permissions:
  contents: read
  id-token: write           # required: lets npm mint OIDC credentials

concurrency:                # never let two publish runs race
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Skip if this version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "::notice::$NAME@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
